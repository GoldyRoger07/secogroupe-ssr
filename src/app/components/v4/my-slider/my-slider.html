<swiper-container autoplay-delay="2500" effect="fade" autoplay-disable-on-interaction="false">
  @for(img of images; track $index){

    <swiper-slide>
      <img [src]="img" class="w-screen h-full object-top" fetchpriority="high" alt="slide">
    </swiper-slide>

  }
 
</swiper-container>
